[window]
opacity = 0.9 # 0.93
padding = { x = 6, y = 6 }

[font]
size = 12.0 # 10/11; norm is 12

[font.normal]
family = "FiraMono Nerd Font"
style = "Regular"

[font.bold]
family = "FiraMono Nerd Font"
style = "Bold"

[font.italic]
family = "FiraMono Nerd Font"
style = "Italic"

[font.bold_italic]
family = "FiraMono Nerd Font"
style = "Bold Italic"

[colors]
primary = { foreground = "#909090" }
# primary = { foreground = "#c6c6c6", background = "#282c34" }
# primary = { foreground = "#c6c6c6", background = "#131418" }

[mouse]
hide_when_typing = true
