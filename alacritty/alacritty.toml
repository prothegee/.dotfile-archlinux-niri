[window]
opacity = 0.75
padding = { x = 6, y = 6 }

[font]
size = 12.0

[font.normal]
family = "Fira Code"
style = "Regular"

[font.bold]
family = "Fira Code"
style = "Bold"

[font.italic]
family = "Fira Code"
style = "Italic"

[font.bold_italic]
family = "Fira Code"
style = "Bold Italic"

[colors]
primary = { foreground = "#c6c6c6" }
# primary = { foreground = "#c6c6c6", background = "#282c34" }
# primary = { foreground = "#c6c6c6", background = "#131418" }
